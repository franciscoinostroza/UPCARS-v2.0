name: Hourly Tasks

on:
  schedule:
    - cron: '0 * * * *'

jobs:
  sla:
    runs-on: ubuntu-latest
    steps:
      - name: Check SLAs
        run: curl -s -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://upcars-v2.vercel.app/api/cron/sla"

  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check Alerts
        run: curl -s -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://upcars-v2.vercel.app/api/cron/alerts"
